name: Build

on:
  workflow_dispatch:

jobs:
  latex:
    name: Compile LaTeX
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: .apt-cache
          key: ${{ runner.os }}-apt-texlive-${{ hashFiles('.github/texlive-packages.txt') }}
          restore-keys: |
            ${{ runner.os }}-apt-texlive-

      - name: Install TeX Live
        run: |
          mkdir -p .apt-cache/archives/partial
          sudo apt-get update
          xargs sudo apt-get \
            -o Dir::Cache::archives="$PWD/.apt-cache/archives" \
            install -y --no-install-recommends \
            < .github/texlive-packages.txt
          sudo rm -f .apt-cache/archives/lock
          sudo rm -rf .apt-cache/archives/partial
          sudo chown -R "$USER:$USER" .apt-cache

      - name: Show TeX environment
        run: |
          xelatex --version
          latexmk -version

      - name: Compile main.pdf
        run: latexmk -xelatex main.tex

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: latex-build
          path: |
            main.pdf
            main.log
            main.blg
            main.fdb_latexmk
          if-no-files-found: ignore
