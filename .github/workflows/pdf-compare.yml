name: PDF Compare

on:
  workflow_dispatch:
    inputs:
      update_baseline:
        description: "Generate comparison artifacts without enforcing the committed baseline"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  compare:
    name: Build and Compare PDFs
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: .apt-cache
          key: ${{ runner.os }}-apt-texlive-${{ hashFiles('.github/texlive-packages.txt') }}
          restore-keys: |
            ${{ runner.os }}-apt-texlive-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: dev/requirements.txt

      - name: Install TeX Live and Python tooling
        run: |
          mkdir -p .apt-cache/archives/partial
          sudo apt-get update
          xargs sudo apt-get \
            -o Dir::Cache::archives="$PWD/.apt-cache/archives" \
            install -y --no-install-recommends \
            < .github/texlive-packages.txt
          sudo rm -f .apt-cache/archives/lock
          sudo rm -rf .apt-cache/archives/partial
          sudo chown -R "$USER:$USER" .apt-cache
          python -m pip install --upgrade pip
          python -m pip install -r dev/requirements.txt

      - name: Show tool versions
        run: |
          xelatex --version
          latexmk -version
          python --version

      - name: Compile professional-degree sample
        run: latexmk -xelatex main.tex

      - name: Prepare academic-degree sample
        run: python dev/make_academic_entry.py

      - name: Compile academic-degree sample
        run: latexmk -xelatex -jobname=main-academic -outdir=tmp/ci-academic tmp/ci-academic/main-academic.tex

      - name: Generate PDF comparison artifacts
        if: ${{ github.event.inputs.update_baseline == 'true' }}
        run: python dev/run_pdf_compare.py --output-dir tmp/pdf-compare

      - name: Check PDF comparison baseline
        if: ${{ github.event.inputs.update_baseline != 'true' }}
        run: python dev/run_pdf_compare.py --output-dir tmp/pdf-compare --check-baseline

      - name: Upload PDF comparison artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pdf-compare
          path: |
            tmp/pdf-compare/**
            main.pdf
            main.log
            tmp/ci-academic/main-academic.pdf
            tmp/ci-academic/main-academic.log
          if-no-files-found: ignore
